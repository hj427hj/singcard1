<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>音乐杀 · 唱卡库</title>
    <script src="https://cdn.jsdelivr.net/npm/pinyin-pro@3.26.0/dist/index.js"></script>
    <style>
        :root {
            --bg: #ffffff;
            --card: #f5f5f5;
            --text: #1a1a1a;
            --sub: #555;
            --green: #1DB954;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, "Segoe UI", "PingFang SC", Roboto, sans-serif;
            background: var(--bg); color: var(--text);
            max-width: 100vw; margin: auto; padding: 20px 16px 60px;
            display: flex; flex-direction: column; align-items: center;
        }
        h1 { text-align: center; font-size: 2em; margin: 20px 0; color: var(--green); }
        .search-box {
            width: 100%; max-width: 800px; padding: 14px 18px; font-size: 1.1em;
            border-radius: 30px; border: 1px solid #ddd; background: #f0f0f0; color: #1a1a1a;
            margin-bottom: 20px; outline: none;
        }
        .status { text-align: center; color: #888; margin: 10px 0; font-size: 0.9rem; }
        .results-count { font-size: 0.85rem; color: #888; margin-bottom: 10px; text-align: center; }
        .main-layout {
            display: flex; gap: 15px; width: 100%; max-width: 900px;
            position: relative;
        }
        .alpha-index {
            position: fixed; left: 8px; top: 50%; transform: translateY(-50%);
            display: flex; flex-direction: column; gap: 2px;
            z-index: 100; background: rgba(255,255,255,0.95);
            padding: 6px 4px; border-radius: 12px;
            border: 1px solid #ddd;
        }
        .alpha-index a {
            color: #666; text-decoration: none; font-size: 0.75rem;
            font-weight: 700; text-align: center; padding: 3px 6px;
            border-radius: 6px; transition: 0.2s;
            min-width: 24px; display: block;
        }
        .alpha-index a:hover, .alpha-index a.active { color: var(--green); background: #e0e0e0; }
        .song-list {
            flex: 1; max-width: 800px; margin-left: 45px;
        }
        .letter-group { margin-bottom: 25px; }
        .letter-header {
            color: var(--green); font-size: 1.5em; font-weight: 800;
            padding: 8px 0; border-bottom: 2px solid var(--green);
            margin-bottom: 12px; text-transform: uppercase;
        }
        .song-group {
            background: var(--card); border-radius: 16px; padding: 18px 16px;
            margin-bottom: 14px; border-left: 5px solid var(--green);
        }
        .song-title { font-size: 1.35rem; font-weight: 700; margin-bottom: 12px; color: var(--green); }
        .segment-item {
            background: #e8e8e8; border-radius: 12px; padding: 12px 14px;
            margin-bottom: 8px;
            display: flex; flex-wrap: wrap; align-items: center; gap: 10px;
        }
        .segment-left { flex: 1; min-width: 180px; }
        .segment-time { font-weight: 700; color: var(--green); font-size: 0.95rem; margin-bottom: 4px; }
        .segment-lyric { color: var(--sub); font-size: 0.95rem; line-height: 1.5; white-space: pre-wrap; word-break: break-word; }
        .play-btn {
            background: var(--green); border: none; color: #fff; font-weight: 700;
            padding: 10px 20px; border-radius: 30px; font-size: 0.9rem; cursor: pointer; white-space: nowrap;
        }
        .play-btn:active { opacity: 0.8; }
        .now-playing {
            display: flex; align-items: center; gap: 10px;
            margin-top: 8px; flex-basis: 100%;
        }
        .now-playing audio { flex: 1; min-width: 0; height: 36px; border-radius: 20px; background: #e0e0e0; }
        .stop-btn {
            background: #ccc; border: none; color: #333; font-weight: 700;
            padding: 8px 16px; border-radius: 20px; cursor: pointer;
        }
        .empty { text-align: center; color: #888; margin-top: 40px; font-size: 1.1rem; }

        @media (max-width: 600px) {
            .alpha-index { left: 2px; padding: 4px 2px; }
            .alpha-index a { font-size: 0.7rem; padding: 2px 4px; min-width: 20px; }
            .song-list { margin-left: 32px; }
        }
    </style>
</head>
<body>
    <h1>🎤 音乐杀 · 唱卡库</h1>
    <input type="text" class="search-box" id="searchInput" placeholder="输入歌曲名，如：期待你的爱" autocomplete="off" autofocus>
    <div class="status" id="statusMsg">🎵 歌曲库加载中...</div>
    <div class="results-count" id="resultsCount"></div>

    <div class="main-layout">
        <div class="alpha-index" id="alphaIndex"></div>
        <div class="song-list" id="songListContainer"></div>
    </div>

    <script>
        (function() {
            let songLibrary = [];
            let loading = true;
            let groupedSongs = {};

            function getFirstPinyinLetter(name) {
                if (!name) return '#';
                if (/[\u4e00-\u9fff]/.test(name)) {
                    const py = window.pinyinPro.pinyin(name, { toneType: 'none', type: 'array' })[0];
                    if (py) return py.charAt(0).toUpperCase();
                }
                const ch = name.trim().charAt(0).toUpperCase();
                if (/[A-Z]/.test(ch)) return ch;
                return '#';
            }

            async function loadSongs() {
                try {
                    const res = await fetch('songs.csv?v=' + Date.now());
                    if (!res.ok) throw new Error('加载失败');
                    const buffer = await res.arrayBuffer();
                    const text = new TextDecoder('utf-8').decode(buffer);
                    songLibrary = parseCSV(text);
                    songLibrary.sort((a, b) => a.songName.localeCompare(b.songName, 'zh'));
                    groupSongs();
                    buildAlphaIndex();
                    document.getElementById('statusMsg').style.display = 'none';
                } catch (e) {
                    console.error(e);
                    songLibrary = [];
                    document.getElementById('statusMsg').textContent = '⚠️ 歌曲数据加载失败，请检查 songs.csv';
                } finally {
                    loading = false;
                    renderResults(searchInput.value);
                }
            }

            function parseCSV(csvText) {
                const rows = [];
                let currentRow = [];
                let currentField = '';
                let inQuotes = false;

                for (let i = 0; i < csvText.length; i++) {
                    const ch = csvText[i];
                    if (inQuotes) {
                        if (ch === '"') {
                            if (i + 1 < csvText.length && csvText[i + 1] === '"') {
                                currentField += '"';
                                i++;
                            } else {
                                inQuotes = false;
                            }
                        } else {
                            currentField += ch;
                        }
                    } else {
                        if (ch === '"') {
                            inQuotes = true;
                        } else if (ch === ',') {
                            currentRow.push(currentField.trim());
                            currentField = '';
                        } else if (ch === '\n') {
                            currentRow.push(currentField.trim());
                            if (currentRow.length > 0) rows.push(currentRow);
                            currentRow = [];
                            currentField = '';
                        } else if (ch !== '\r') {
                            currentField += ch;
                        }
                    }
                }
                if (currentField) currentRow.push(currentField.trim());
                if (currentRow.length > 0) rows.push(currentRow);

                if (rows.length < 2) return [];
                const songsMap = {};
                for (let i = 1; i < rows.length; i++) {
                    const cols = rows[i];
                    if (cols.length < 4) continue;
                    const songName = cols[0];
                    const time = cols[1];
                    const lyric = cols[2];
                    const file = cols[3];
                    if (!songName || !file) continue;

                    if (!songsMap[songName]) songsMap[songName] = [];
                    songsMap[songName].push({ time, lyric, file });
                }
                return Object.keys(songsMap).map(name => ({
                    songName: name,
                    segments: songsMap[name]
                }));
            }

            function groupSongs() {
                groupedSongs = {};
                songLibrary.forEach(song => {
                    const letter = getFirstPinyinLetter(song.songName);
                    if (!groupedSongs[letter]) groupedSongs[letter] = [];
                    groupedSongs[letter].push(song);
                });
                Object.keys(groupedSongs).forEach(l => {
                    groupedSongs[l].sort((a, b) => a.songName.localeCompare(b.songName, 'zh'));
                });
            }

            function buildAlphaIndex() {
                const indexDiv = document.getElementById('alphaIndex');
                const letters = Object.keys(groupedSongs).sort((a, b) => {
                    if (a === '#') return 1;
                    if (b === '#') return -1;
                    return a.localeCompare(b);
                });
                let html = '';
                letters.forEach(l => {
                    html += `<a href="#letter-${l}" onclick="scrollToLetter('${l}')" title="跳转到 ${l}">${l}</a>`;
                });
                indexDiv.innerHTML = html;
            }

            window.scrollToLetter = function(letter) {
                const el = document.getElementById('letter-' + letter);
                if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
                document.querySelectorAll('.alpha-index a').forEach(a => a.classList.remove('active'));
                const activeLink = document.querySelector(`.alpha-index a[href="#letter-${letter}"]`);
                if (activeLink) activeLink.classList.add('active');
            };

            const searchInput = document.getElementById('searchInput');
            const resultsCount = document.getElementById('resultsCount');
            const songListContainer = document.getElementById('songListContainer');

            function escapeHtml(str) {
                const div = document.createElement('div');
                div.textContent = typeof str === 'string' ? str : '';
                return div.innerHTML;
            }

            function renderResults(searchTerm = '') {
                if (loading) return;
                const term = searchTerm.trim().toLowerCase();

                if (term) {
                    let filtered = songLibrary.filter(s => s.songName.toLowerCase().includes(term));
                    if (filtered.length === 0) {
                        resultsCount.textContent = '';
                        songListContainer.innerHTML = '<div class="empty">😕 没找到，换个关键词试试</div>';
                        return;
                    }
                    resultsCount.textContent = `找到 ${filtered.length} 首歌`;
                    let html = '';
                    filtered.forEach((song, idx) => { html += buildSongCard(song, idx); });
                    songListContainer.innerHTML = html;
                    bindPlayButtons();
                    return;
                }

                let totalCount = 0;
                let html = '';
                const letters = Object.keys(groupedSongs).sort((a, b) => {
                    if (a === '#') return 1;
                    if (b === '#') return -1;
                    return a.localeCompare(b);
                });

                letters.forEach(letter => {
                    const songs = groupedSongs[letter];
                    html += `<div class="letter-group" id="letter-${letter}"><div class="letter-header">${letter}</div>`;
                    songs.forEach((song, idx) => { html += buildSongCard(song, idx); totalCount++; });
                    html += '</div>';
                });

                resultsCount.textContent = `共 ${totalCount} 首歌`;
                songListContainer.innerHTML = html;
                bindPlayButtons();
            }

            function buildSongCard(song, idx) {
                let html = `<div class="song-group"><div class="song-title">🎵 ${escapeHtml(song.songName)}</div>`;
                if (song.segments && song.segments.length > 0) {
                    song.segments.forEach((seg, segIdx) => {
                        const uniqueId = `player_${idx}_${segIdx}`;
                        html += `
                        <div class="segment-item" id="seg_${uniqueId}">
                            <div class="segment-left">
                                <div class="segment-time">⏱ ${escapeHtml(seg.time)}</div>
                                <div class="segment-lyric">📝 ${escapeHtml(seg.lyric)}</div>
                            </div>
                            <button class="play-btn" data-id="${uniqueId}" data-file="${escapeHtml(seg.file)}">▶ 播放</button>
                        </div>`;
                    });
                }
                html += '</div>';
                return html;
            }

            function bindPlayButtons() {
                document.querySelectorAll('.play-btn').forEach(btn => {
                    btn.addEventListener('click', function() {
                        const uniqueId = this.dataset.id;
                        const file = this.dataset.file;
                        const segmentDiv = document.getElementById('seg_' + uniqueId);
                        if (!segmentDiv) return;
                        const existingPlayer = segmentDiv.querySelector('.now-playing');
                        if (existingPlayer) {
                            existingPlayer.remove();
                            this.textContent = '▶ 播放';
                            return;
                        }
                        document.querySelectorAll('.now-playing').forEach(p => p.remove());
                        document.querySelectorAll('.play-btn').forEach(b => b.textContent = '▶ 播放');

                        const playerDiv = document.createElement('div');
                        playerDiv.className = 'now-playing';
                        const audio = document.createElement('audio');
                        audio.controls = true;
                        audio.autoplay = true;
                        audio.src = file;
                        const stopBtn = document.createElement('button');
                        stopBtn.className = 'stop-btn';
                        stopBtn.textContent = '✕ 关闭';
                        stopBtn.addEventListener('click', () => {
                            playerDiv.remove();
                            btn.textContent = '▶ 播放';
                        });
                        audio.addEventListener('ended', () => {
                            playerDiv.remove();
                            btn.textContent = '▶ 播放';
                        });
                        playerDiv.appendChild(audio);
                        playerDiv.appendChild(stopBtn);
                        segmentDiv.appendChild(playerDiv);
                        this.textContent = '⏸ 播放中';
                    });
                });
            }

            searchInput.addEventListener('input', e => renderResults(e.target.value));
            loadSongs();
        })();
    </script>
</body>
</html>
